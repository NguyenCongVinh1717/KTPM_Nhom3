<!DOCTYPE html>
<html>

<head>
    <title>WebSocket Chat</title>
</head>

<body>

<h2>Realtime Chat</h2>

<input type="text"
       id="name"
       placeholder="Your name">

<input type="text"
       id="message"
       placeholder="Message">

<input type="text"
       id="room"
       placeholder="Room">

<button onclick="joinRoom()">
    Join Room
</button>

<button onclick="sendMessage()">
    Send
</button>

<ul id="chat"></ul>

<h3>Online Users</h3>

<ul id="users"></ul>

<script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>

<script src="https://cdn.jsdelivr.net/npm/stompjs@2.3.3/lib/stomp.min.js"></script>

<script>

    const socket =
        new SockJS('http://localhost:8080/chat');

    const stompClient =
        Stomp.over(socket);

    let currentRoom = "";

    let subscription = null;

    let userSubscription = null;

    stompClient.connect({}, function () {

        console.log("Connected");
    });

    function joinRoom() {

        currentRoom =
            document.getElementById("room").value;

        // unsubscribe chat
        if (subscription != null) {

            subscription.unsubscribe();
        }

        // unsubscribe users
        if (userSubscription != null) {

            userSubscription.unsubscribe();
        }

        // Subscribe chat room
        subscription = stompClient.subscribe(

            '/topic/' + currentRoom,

            function (message) {

                const data =
                    JSON.parse(message.body);

                const li =
                    document.createElement("li");

                li.innerText =
                    data.sender + ": "
                    + data.content;

                document.getElementById("chat")
                    .appendChild(li);
            }
        );

        // Subscribe online users
        userSubscription = stompClient.subscribe(

            '/topic/' + currentRoom + '/users',

            function (message) {

                const users =
                    JSON.parse(message.body);

                const usersUl =
                    document.getElementById("users");

                usersUl.innerHTML = "";

                users.forEach(user => {

                    const li =
                        document.createElement("li");

                    li.innerText = user;

                    usersUl.appendChild(li);
                });
            }
        );

        // Delay cho subscribe active
        setTimeout(() => {

            stompClient.send(

                "/app/user.join",

                {},

                JSON.stringify({

                    sender:
                        document.getElementById("name").value,

                    roomId: currentRoom

                })
            );

        }, 500);

        alert("Joined " + currentRoom);
    }

    function sendMessage() {

        const sender =
            document.getElementById("name").value;

        const content =
            document.getElementById("message").value;

        stompClient.send(

            "/app/sendMessage",

            {},

            JSON.stringify({

                sender: sender,

                content: content,

                roomId: currentRoom

            })
        );
    }

</script>

</body>

</html>
