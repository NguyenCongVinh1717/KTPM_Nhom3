<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sportify Admin | Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    
    <style>
        :root {
            --white: #ffffff;
            --bg-right: #f8f9fa; 
            --text-main: #111111;
            --text-muted: #6b7280;
            --border: #e5e7eb;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Montserrat', sans-serif;
        }

        body {
            height: 100vh;
            display: flex;
            overflow: hidden;
            background-color: var(--white);
        }

        .left-panel {
            flex: 1; 
            background-image: url('https://images.unsplash.com/photo-1599058917765-a780eda07a3e?q=80&w=2070&auto=format&fit=crop');
            background-size: cover;
            background-position: center;
            padding: 80px 100px;
            display: flex;
            flex-direction: column;
            justify-content: flex-start; 
            position: relative;
        }

        .left-panel::before {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255, 255, 255, 0.25); 
            z-index: 1;
        }

        .logo-brand {
            font-size: 26px;
            font-weight: 900;
            font-style: italic;
            text-transform: uppercase;
            letter-spacing: -1px;
            color: var(--text-main); 
            margin-bottom: 50px;
            position: relative;
            z-index: 2;
        }

        .left-content {
            max-width: 480px;
            position: relative;
            z-index: 2;
        }

        .line-top {
            width: 40px;
            height: 3px;
            background: var(--text-main);
            margin-bottom: 30px;
        }

        .left-content h1 {
            font-size: 42px;
            font-weight: 800;
            line-height: 1.2;
            color: var(--text-main); 
            margin-bottom: 25px;
        }

        .left-content p {
            font-size: 15px;
            color: #2d3748; 
            line-height: 1.6;
            font-weight: 600;
        }

        .right-panel {
            flex: 1; 
            background-color: var(--bg-right);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 80px;
            position: relative;
        }

        .login-card {
            width: 100%;
            max-width: 460px; 
            background: var(--white);
            border-radius: 16px;
            padding: 50px 55px;
            box-shadow: 0 10px 35px rgba(0, 0, 0, 0.03);
        }

        .login-header h2 {
            font-size: 30px;
            font-weight: 800;
            margin-bottom: 10px;
            color: var(--text-main);
        }

        .login-header p {
            color: var(--text-muted);
            font-size: 14px;
            margin-bottom: 35px;
        }

        .form-group {
            margin-bottom: 22px;
        }

        .form-group label {
            display: block;
            font-size: 12px;
            font-weight: 700;
            margin-bottom: 8px;
            color: #374151;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .input-group {
            position: relative;
            display: flex;
            align-items: center;
        }

        .input-group i {
            position: absolute;
            left: 15px;
            color: #9ca3af;
            font-size: 14px;
        }

        .input-group .eye-icon {
            left: auto;
            right: 15px;
            cursor: pointer;
        }

        .form-control {
            width: 100%;
            padding: 13px 15px 13px 45px;
            border: 1px solid var(--border);
            border-radius: 8px;
            font-size: 14px;
            outline: none;
            transition: 0.2s;
        }

        .form-control:focus {
            border-color: var(--text-main);
        }

        .forgot-pass {
            display: block;
            text-align: right;
            font-size: 13px;
            color: var(--text-muted);
            text-decoration: none;
            margin-top: 12px;
            font-weight: 600;
        }

        .forgot-pass:hover {
            color: var(--text-main);
            text-decoration: underline;
        }

        .btn-login {
            width: 100%;
            background: var(--text-main);
            color: white;
            border: none;
            padding: 15px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 700;
            margin-top: 30px;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            transition: background 0.2s;
        }

        .btn-login:hover {
            background: #222222;
        }

        .divider {
            display: flex;
            align-items: center;
            margin: 30px 0 20px 0;
            color: #cbd5e1;
            font-size: 12px;
        }

        .divider::before, .divider::after {
            content: "";
            flex: 1;
            border-bottom: 1px solid #e2e8f0;
        }

        .divider span {
            padding: 0 15px;
            color: #94a3b8;
        }

        /* Container căn giữa nút Google chuẩn */
        .google-btn-container {
            display: flex;
            justify-content: center;
            margin-bottom: 30px;
        }

        .signup-link {
            text-align: center;
            font-size: 14px;
            color: var(--text-muted);
        }

        .signup-link a {
            color: var(--text-main);
            text-decoration: none;
            font-weight: 800;
        }

        .signup-link a:hover {
            text-decoration: underline;
        }

        .signup-link {
            text-align: center;
            font-size: 14px;
            color: var(--text-muted);
        }

        .signup-link a {
            color: var(--text-main);
            text-decoration: none;
            font-weight: 800;
        }

        .signup-link a:hover {
            text-decoration: underline;
        }

        .msg {
            color: #e11d48;
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 15px;
            text-align: center;
        }
    </style>
</head>

<body>
    <div id="g_id_onload"
         data-client_id="1093888167494-njc36m9n4lhbeess9fskjeork1ks3in2.apps.googleusercontent.com"
         data-context="signin"
         data-ux_mode="popup"
         data-callback="handleCredentialResponse"
         data-auto_prompt="false">
    </div>

    <div class="left-panel">
        <div class="logo-brand">SPORTIFY</div>
        <div class="left-content">
            <div class="line-top"></div>
            <h1>Quản lý cửa hàng<br>thể thao chuyên nghiệp</h1>
            <p>Đăng nhập để truy cập và quản lý toàn bộ hoạt động của cửa hàng một cách hiệu quả.</p>
        </div>
    </div>

    <div class="right-panel">
        <div class="login-card">
            <div class="login-header">
                <h2>Đăng nhập</h2>
                <p>Chào mừng bạn quay trở lại với Sportify Admin</p>
            </div>

            <div id="msg" class="msg"></div>

            <form id="loginForm">
                <div class="form-group">
                    <label>Địa chỉ Email</label>
                    <div class="input-group">
                        <i class="fa-regular fa-envelope"></i> <input type="email" id="email" class="form-control" placeholder="example@gmail.com" required>
                    </div>
                </div>

                <div class="form-group" style="margin-bottom: 0;">
                    <label>Mật khẩu</label>
                    <div class="input-group">
                        <i class="fa-solid fa-lock"></i>
                        <input type="password" id="password" class="form-control" placeholder="Nhập mật khẩu" required>
                        <i class="fa-regular fa-eye-slash eye-icon" id="togglePasswordBtn"></i>
                    </div>
                </div>

                <a href="#" class="forgot-pass">Quên mật khẩu?</a>

                <button type="submit" class="btn-login">Đăng nhập</button>
            </form>

            <div class="divider">
                <span>hoặc đăng nhập với</span>
            </div>

            <div class="google-btn-container">
                <div class="g_id_signin"
                     data-type="standard"
                     data-shape="rectangular"
                     data-theme="outline"
                     data-text="signin_with"
                     data-size="large"
                     data-logo_alignment="left"
                     data-width="350">
                </div>
            </div>

            <div class="signup-link">
                Chưa có tài khoản? <a href="register.html">Đăng ký ngay</a>
            </div>
        </div>
    </div>

    <script src="api.js"></script>
    <script>
        // Tính năng ẩn/hiện mật khẩu
        const passwordInput = document.getElementById('password');
        const togglePasswordBtn = document.getElementById('togglePasswordBtn');
        
        togglePasswordBtn.addEventListener('click', () => {
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                togglePasswordBtn.classList.replace('fa-eye-slash', 'fa-eye');
            } else {
                passwordInput.type = 'password';
                togglePasswordBtn.classList.replace('fa-eye', 'fa-eye-slash');
            }
        });

        const form = document.getElementById('loginForm');
        const msg = document.getElementById('msg');

        // FORM ĐĂNG NHẬP BẰNG EMAIL/MAT KHAU THƯỜNG
        form.addEventListener('submit', async (e) => {
            e.preventDefault(); 
            msg.textContent = ''; 

            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value.trim();

            try {
                const data = await apiPost('/auth/login', { email, password }, false);
                
                localStorage.setItem('token', data.token);
                localStorage.setItem('role', data.role);

                const userRole = data.role ? data.role.toUpperCase() : '';

                if (userRole.includes('ADMIN')) {
                    window.location.href = 'admin_product.html';
                } else if (userRole.includes('USER')) {
                    window.location.href = 'products.html';
                } else {
                    msg.textContent = 'Vai trò ' + userRole + ' không có quyền truy cập!';
                }

            } catch (err) {
                console.error(err);
                msg.textContent = 'Sai tài khoản email hoặc mật khẩu!';
            }
        });

        // FIX: XÓA bỏ hoàn toàn EventListener click cũ của customGoogleBtn vì Google SDK sẽ tự động xử lý nút chuẩn.

        // HÀM XỬ LÝ SAU KHI CHỌN TÀI KHOẢN GOOGLE THÀNH CÔNG
        async function handleCredentialResponse(response) {
            msg.textContent = '';
            try {
                // Gửi ID Token của Google lên API login OAuth2 của backend
                const data = await apiPost('/auth/google', { token: response.credential }, false);
                
                // Đồng bộ lưu thông tin token hệ thống tương tự login thường
                localStorage.setItem('token', data.token);
                localStorage.setItem('role', data.role);

                const userRole = data.role ? data.role.toUpperCase() : '';

                if (userRole.includes('ADMIN')) {
                    window.location.href = 'admin_product.html';
                } else if (userRole.includes('USER')) {
                    window.location.href = 'products.html';
                } else {
                    msg.textContent = 'Tài khoản Google này mang vai trò ' + userRole + ' không có quyền truy cập!';
                }
            } catch (err) {
                console.error(err);
                msg.textContent = 'Đăng nhập bằng Google thất bại hoặc từ chối truy cập!';
            }
        }
    </script>
</body>

</html>
