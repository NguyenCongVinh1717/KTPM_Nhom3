<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>ÆTHER | Black Label Sportswear</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background-color: #000000;
      font-family: 'Syne', sans-serif;
      color: #f0f0f0;
      overflow-x: hidden;
    }

    /* signature cursor effect */
    ::selection {
      background: #ffffff;
      color: #000000;
    }

    /* cinematic scroll */
    ::-webkit-scrollbar {
      width: 4px;
    }
    ::-webkit-scrollbar-track {
      background: #0a0a0a;
    }
    ::-webkit-scrollbar-thumb {
      background: #ffffff;
    }

    /* ========== header futuristic ========== */
    .header {
      position: fixed;
      top: 0;
      width: 100%;
      z-index: 2000;
      padding: 1.2rem 3rem;
      background: rgba(0, 0, 0, 0.65);
      backdrop-filter: blur(16px);
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
      transition: all 0.4s ease;
    }
    .header-inner {
      max-width: 1600px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 2rem;
      flex-wrap: wrap;
    }
    .logo {
      font-size: 1.8rem;
      font-weight: 800;
      letter-spacing: -0.03em;
      text-decoration: none;
      color: #ffffff;
      background: linear-gradient(125deg, #fff, #9e9e9e);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }
    .logo sup {
      font-size: 0.7rem;
      color: #aaa;
    }
    .search-bar-top {
      flex: 1;
      max-width: 480px;
      position: relative;
    }
    .search-bar-top input {
      width: 100%;
      background: #111111;
      border: 1px solid #222;
      border-radius: 60px;
      padding: 14px 24px;
      color: white;
      font-weight: 400;
      transition: 0.3s;
      outline: none;
    }
    .search-bar-top input:focus {
      border-color: #ffffff;
      background: #000;
      box-shadow: 0 0 0 2px rgba(255,255,255,0.1);
    }
    .search-bar-top button {
      position: absolute;
      right: 8px;
      top: 50%;
      transform: translateY(-50%);
      background: #ffffff;
      border: none;
      padding: 6px 20px;
      border-radius: 60px;
      font-weight: 700;
      font-size: 12px;
      cursor: pointer;
      transition: 0.2s;
    }
    .user-actions {
      display: flex;
      gap: 1.8rem;
      align-items: center;
    }
    .user-actions a {
      text-decoration: none;
      font-weight: 600;
      font-size: 0.85rem;
      color: #ddd;
      letter-spacing: 0.5px;
    }
    .cart-btn-wrapper {
      background: #ffffff;
      color: #000000 !important;
      padding: 8px 22px;
      border-radius: 40px;
      display: flex;
      align-items: center;
      gap: 12px;
      font-weight: 800;
      transition: 0.2s;
    }
    .cart-badge {
      background: #ff3b30;
      color: white;
      border-radius: 40px;
      padding: 2px 6px;
      font-size: 10px;
      margin-left: 4px;
    }

    /* ========== 3D HERO - architectural ========== */
    .hero-zone {
      min-height: 100vh;
      width: 100%;
      position: relative;
      display: flex;
      align-items: center;
      background: radial-gradient(circle at 70% 20%, #0c0c0c, #000000);
      isolation: isolate;
    }
    .hero-grid {
      max-width: 1600px;
      margin: 0 auto;
      padding: 8rem 3rem 4rem;
      display: grid;
      grid-template-columns: 1.2fr 0.8fr;
      gap: 3rem;
    }
    .hero-main h6 {
      font-size: 0.8rem;
      letter-spacing: 6px;
      color: #aaa;
      font-weight: 500;
      margin-bottom: 1rem;
    }
    .hero-main h1 {
      font-size: 6rem;
      font-weight: 800;
      line-height: 1;
      text-transform: uppercase;
      letter-spacing: -0.03em;
      background: linear-gradient(135deg, #fff, #7c7c7c);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }
    .hero-desc {
      margin: 1.5rem 0 2rem;
      font-size: 1rem;
      max-width: 80%;
      color: #aaa;
      font-weight: 400;
    }
    .hero-cta {
      background: white;
      color: black;
      padding: 14px 42px;
      border-radius: 60px;
      font-weight: 800;
      display: inline-block;
      text-decoration: none;
      transition: 0.25s;
      box-shadow: 0 0 12px rgba(255,255,255,0.2);
    }
    .hero-stats {
      display: flex;
      gap: 2rem;
      margin-top: 3rem;
    }
    .stat p:first-child {
      font-size: 2rem;
      font-weight: 800;
    }
    .hero-media {
      background: #0a0a0a;
      border-radius: 42px;
      overflow: hidden;
      aspect-ratio: 1 / 1;
      border: 1px solid rgba(255,255,255,0.05);
      box-shadow: 0 25px 40px -15px black;
    }
    .hero-media img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      filter: grayscale(0.2);
    }

    /* brand runway */
    .runway-strip {
      display: flex;
      justify-content: center;
      gap: 3rem;
      padding: 2rem 2rem;
      border-top: 1px solid rgba(255,255,255,0.03);
      border-bottom: 1px solid rgba(255,255,255,0.03);
      background: #010101;
      flex-wrap: wrap;
    }
    .brand-pill {
      font-weight: 700;
      font-size: 0.8rem;
      letter-spacing: 1.5px;
      padding: 0.5rem 1rem;
      cursor: pointer;
      transition: 0.2s;
      color: #6a6a6a;
    }
    .brand-pill.active, .brand-pill:hover {
      color: white;
      background: rgba(255,255,255,0.05);
      border-radius: 40px;
    }

    /* main layout */
    .store-grid {
      max-width: 1600px;
      margin: 5rem auto;
      padding: 0 3rem;
      display: grid;
      grid-template-columns: 280px 1fr;
      gap: 3rem;
    }

    /* luxury filter panel */
    .filter-vault {
      background: rgba(12,12,12,0.8);
      backdrop-filter: blur(12px);
      border-radius: 32px;
      padding: 2rem;
      height: fit-content;
      border: 1px solid rgba(255,255,255,0.05);
      position: sticky;
      top: 100px;
    }
    .filter-vault h4 {
      font-size: 1rem;
      font-weight: 700;
      margin-bottom: 1.5rem;
      letter-spacing: 1px;
    }
    .price-range-area {
      margin-bottom: 2rem;
    }
    #priceRange {
      width: 100%;
      background: #222;
      height: 3px;
      accent-color: white;
    }
    .filter-btn {
      width: 100%;
      background: white;
      color: black;
      border: none;
      padding: 14px;
      border-radius: 40px;
      font-weight: 800;
      cursor: pointer;
    }

    /* product grid - ultra modern masonry */
    .product-canvas {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 2.5rem;
    }
    .product-tile {
      transition: all 0.4s cubic-bezier(0.2, 0.9, 0.4, 1.1);
    }
    .image-vault {
      background: #0c0c0c;
      border-radius: 28px;
      aspect-ratio: 1 / 1;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      border: 1px solid rgba(255,255,255,0.08);
      transition: 0.3s;
    }
    .image-vault img {
      width: 80%;
      height: 80%;
      object-fit: contain;
      filter: drop-shadow(0 8px 16px black);
      transition: 0.5s;
    }
    .product-tile:hover .image-vault {
      transform: translateY(-6px);
      border-color: rgba(255,255,255,0.4);
    }
    .product-tile:hover .image-vault img {
      transform: scale(1.07);
    }
    .product-meta {
      padding: 1rem 0.5rem 0;
    }
    .brand-sub {
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 1px;
      color: #999;
    }
    .product-name {
      font-size: 1rem;
      font-weight: 700;
      margin: 6px 0;
    }
    .price-zone {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 10px;
    }
    .price-digit {
      font-weight: 800;
      font-size: 1.2rem;
    }
    .quick-add {
      background: transparent;
      border: 1px solid #333;
      border-radius: 40px;
      padding: 6px 16px;
      font-weight: 600;
      font-size: 0.7rem;
      cursor: pointer;
      transition: 0.2s;
      color: white;
    }
    .quick-add:hover {
      background: white;
      color: black;
      border-color: white;
    }

    /* modal glassmorphic 2.0 */
    .modal-future {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.85);
      backdrop-filter: blur(20px);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 3000;
    }
    .modal-container {
      background: #070707;
      max-width: 1000px;
      width: 90%;
      border-radius: 48px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 2rem;
      padding: 2rem;
      border: 1px solid rgba(255,255,255,0.1);
      position: relative;
    }
    .close-modal {
      position: absolute;
      right: 28px;
      top: 28px;
      font-size: 28px;
      background: none;
      border: none;
      color: #aaa;
      cursor: pointer;
    }
    .modal-img-preview {
      background: #101010;
      border-radius: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      aspect-ratio: 1/1;
    }
    .modal-img-preview img {
      width: 85%;
      height: 85%;
      object-fit: contain;
    }
    .variant-option {
      display: inline-block;
      background: #1a1a1a;
      border: 1px solid #2b2b2b;
      padding: 6px 18px;
      border-radius: 40px;
      margin: 0 8px 8px 0;
      cursor: pointer;
      font-weight: 500;
    }
    .variant-option.selected {
      background: white;
      color: black;
    }
    .btn-dark-add {
      background: white;
      width: 100%;
      padding: 16px;
      border-radius: 60px;
      font-weight: 800;
      margin-top: 20px;
      cursor: pointer;
    }

    /* floating */
    .float-panel {
      position: fixed;
      bottom: 30px;
      right: 30px;
      display: flex;
      gap: 12px;
      z-index: 1000;
    }
    .float-icon {
      width: 48px;
      height: 48px;
      background: #0a0a0a;
      border-radius: 60px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      border: 1px solid #2a2a2a;
      transition: 0.2s;
      text-decoration: none;
    }

    @media (max-width: 900px) {
      .hero-grid { grid-template-columns: 1fr; text-align: center; }
      .hero-main h1 { font-size: 3rem; }
      .store-grid { grid-template-columns: 1fr; }
      .modal-container { grid-template-columns: 1fr; }
      .header-inner { padding: 0 1rem; }
    }
  </style>
</head>
<body>

<header class="header">
  <div class="header-inner">
    <a href="#" class="logo">ÆTHER<span style="font-size: 0.8rem;">®</span></a>
    <div class="search-bar-top">
      <input type="text" id="searchInput" placeholder="tìm kiếm đẳng cấp...">
      <button onclick="handleSearch()">⟶</button>
    </div>
    <div class="user-actions">
      <a href="login.html">ĐĂNG NHẬP</a>
      <a href="cart.html" class="cart-btn-wrapper">
        <i class="fa-regular fa-bag-shopping"></i>
        <span id="cart-count" style="font-weight: 900;">0</span>
      </a>
    </div>
  </div>
</header>

<section class="hero-zone">
  <div class="hero-grid">
    <div class="hero-main">
      <h6>LIMINAL EDITION</h6>
      <h1>SCULPT<br>THE GAME</h1>
      <p class="hero-desc">Kiến trúc vận động tối thượng. Bộ sưu tập công nghỉ thể thao thế hệ mới.</p>
      <a href="#productSector" class="hero-cta">KHÁM PHÁ <i class="fa-regular fa-arrow-right"></i></a>
      <div class="hero-stats">
        <div class="stat"><p>15+</p><span>Nhà thiết kế</span></div>
        <div class="stat"><p>4.9</p><span>Đánh giá</span></div>
      </div>
    </div>
    <div class="hero-media">
      <img src="https://images.unsplash.com/photo-1556906781-9a412961c28c?q=80&w=1887&auto=format&fit=crop" alt="hero">
    </div>
  </div>
</section>

<div class="runway-strip" id="brand-list"></div>

<main class="store-grid" id="productSector">
  <aside class="filter-vault">
    <h4>NGÂN SÁCH</h4>
    <div class="price-range-area">
      <div style="display: flex; justify-content: space-between; margin-bottom: 12px;">
        <span>Giới hạn</span>
        <span id="priceValue">2,000,000đ</span>
      </div>
      <input type="range" id="priceRange" min="0" max="2000000" step="100000" value="2000000" oninput="updatePriceDisplay(this.value)">
    </div>
    <button class="filter-btn" onclick="applyFilters()">LỌC THEO GIÁ</button>
  </aside>

  <section>
    <h2 style="font-weight: 700; letter-spacing: -0.5px; margin-bottom: 32px; font-size: 1.8rem;" id="collection-title">THE ICONS</h2>
    <div class="product-canvas" id="product-list"></div>
  </section>
</main>

<div class="modal-future" id="quickViewModal">
  <div class="modal-container">
    <button class="close-modal" onclick="closeModal()"><i class="fa-regular fa-xmark"></i></button>
    <div class="modal-img-preview">
      <img id="m-img" src="">
    </div>
    <div style="display: flex; flex-direction: column;">
      <h3 id="m-name" style="font-size: 1.8rem; font-weight: 800;">product</h3>
      <p id="m-price" style="font-weight: 700; font-size: 1.5rem; margin: 12px 0;"></p>
      <div style="margin-top: 20px;"><span style="font-size: 11px; letter-spacing: 1px;">MÀU SẮC</span><div id="m-colors" style="margin-top: 8px;"></div></div>
      <div style="margin-top: 16px;"><span style="font-size: 11px;">KÍCH THƯỚC</span><div id="m-sizes" style="margin-top: 8px;"></div></div>
      <div id="m-stock" style="margin: 20px 0; font-weight: 500; font-size: 13px;"></div>
      <button id="m-btn" class="btn-dark-add" disabled onclick="submitAdd()">THÊM VÀO TÚI</button>
    </div>
  </div>
</div>

<div class="float-panel">
  <a href="#" class="float-icon"><i class="fa-brands fa-x-twitter"></i></a>
  <a href="tel:0901234567" class="float-icon"><i class="fa-regular fa-phone"></i></a>
</div>

<script src="api.js"></script>
<script>
  let globalCartCount = 0;
  let currentP = null;
  let selColor = null;
  let selSize = null;

  async function loadCartCount() {
    try {
      const res = await apiGet('/cart');
      globalCartCount = (res.items || []).reduce((acc, i) => acc + (i.quantity || 1), 0);
      document.getElementById('cart-count').innerText = globalCartCount;
    } catch (err) {}
  }

  async function loadBrands() {
    const brands = await apiGet('/brands');
    document.getElementById('brand-list').innerHTML = '<div class="brand-pill active" onclick="selectAll(this)">ALL</div>' + 
      brands.map(b => `<div class="brand-pill" onclick="selectBrand(this, ${b.id})">${b.brandName.toUpperCase()}</div>`).join('');
  }

  function renderProducts(products) {
    const container = document.getElementById('product-list');
    container.innerHTML = products.map(p => {
      const img = Array.isArray(p.images) ? p.images[0] : p.images;
      const displayImg = img?.startsWith('http') ? img : `http://localhost:8081/images/${img}`;
      return `
        <div class="product-tile">
          <div class="image-vault" onclick="location.href='product_detail.html?id=${p.id}'" style="cursor:pointer">
            <img src="${displayImg}" alt="${p.productName}">
          </div>
          <div class="product-meta">
            <div class="brand-sub">${p.brandName || 'ÆTHER'}</div>
            <div class="product-name">${p.productName}</div>
            <div class="price-zone">
              <span class="price-digit">${p.price.toLocaleString('vi-VN')}đ</span>
              <button class="quick-add" onclick="event.stopPropagation(); openModal(${p.id})">+ thêm</button>
            </div>
          </div>
        </div>
      `;
    }).join('');
  }

  async function openModal(id) {
    currentP = await apiGet(`/products/${id}`);
    selColor = null; selSize = null;
    document.getElementById('m-name').innerText = currentP.productName;
    document.getElementById('m-price').innerText = currentP.price.toLocaleString('vi-VN') + 'đ';
    const img = currentP.images[0];
    document.getElementById('m-img').src = img?.startsWith('http') ? img : `http://localhost:8081/images/${img}`;
    document.getElementById('m-stock').innerHTML = '';

    const uniqueColors = [...new Map(currentP.variants.map(v => [v.colorId, v])).values()];
    document.getElementById('m-colors').innerHTML = uniqueColors.map(c => `<span class="variant-option" onclick="pickColor(${c.colorId}, this)">${c.colorName}</span>`).join('');
    const uniqueSizes = [...new Map(currentP.variants.map(v => [v.sizeId, v])).values()];
    document.getElementById('m-sizes').innerHTML = uniqueSizes.map(s => `<span class="variant-option" onclick="pickSize(${s.sizeId}, this)">${s.name || s.sizeName}</span>`).join('');
    document.getElementById('m-btn').disabled = true;
    document.getElementById('quickViewModal').style.display = 'flex';
  }

  function pickColor(id, el) {
    selColor = id;
    document.querySelectorAll('#m-colors .variant-option').forEach(i => i.classList.remove('selected'));
    el.classList.add('selected');
    checkV();
  }
  function pickSize(id, el) {
    selSize = id;
    document.querySelectorAll('#m-sizes .variant-option').forEach(i => i.classList.remove('selected'));
    el.classList.add('selected');
    checkV();
  }

  function checkV() {
    const stockDiv = document.getElementById('m-stock');
    const btn = document.getElementById('m-btn');
    if (selColor && selSize) {
      const v = currentP.variants.find(v => v.colorId === selColor && v.sizeId === selSize);
      if (v) {
        const out = v.stock <= 0;
        stockDiv.innerHTML = `<span style="color:${out ? '#ff453a' : '#30d158'}">${out ? 'Hết hàng' : `Sẵn sàng · ${v.stock} sản phẩm`}</span>`;
        btn.disabled = out;
        btn.innerText = out ? "HẾT HÀNG" : "THÊM VÀO GIỎ";
      } else {
        stockDiv.innerHTML = `<span style="color:#ff9f0a">Không có biến thể</span>`;
        btn.disabled = true;
      }
    } else {
      stockDiv.innerHTML = `<span style="color:#636366">Chọn màu & size</span>`;
      btn.disabled = true;
    }
  }

  async function submitAdd() {
    const v = currentP.variants.find(v => v.colorId === selColor && v.sizeId === selSize);
    if (!v) return;
    try {
      await apiPost('/cart/add', { productColorSizeId: v.id, quantity: 1 });
      globalCartCount += 1;
      document.getElementById('cart-count').innerText = globalCartCount;
      Swal.fire({ icon: 'success', title: 'Thêm thành công', background: '#000', color: '#fff', showConfirmButton: false, timer: 1000 });
      closeModal();
    } catch (err) {
      Swal.fire({ icon: 'error', title: 'Lỗi', text: 'Vui lòng đăng nhập', background: '#000', color: '#fff' });
    }
  }

  function closeModal() { document.getElementById('quickViewModal').style.display = 'none'; }
  function updatePriceDisplay(val) { document.getElementById('priceValue').innerText = parseInt(val).toLocaleString('vi-VN') + 'đ'; }
  
  async function selectBrand(el, id) {
    document.querySelectorAll('.brand-pill').forEach(i => i.classList.remove('active'));
    el.classList.add('active');
    const res = await apiGet(`/products/brand/${id}`);
    renderProducts(res);
  }
  async function selectAll(el) {
    if(el) { document.querySelectorAll('.brand-pill').forEach(i => i.classList.remove('active')); el.classList.add('active'); }
    const res = await apiGet('/products');
    renderProducts(res);
    document.getElementById('collection-title').innerText = "THE ICONS";
  }
  async function applyFilters() {
    const maxPrice = parseInt(document.getElementById('priceRange').value);
    const all = await apiGet('/products');
    const filtered = all.filter(p => p.price <= maxPrice);
    renderProducts(filtered);
    Swal.fire({ toast: true, title: `Giá ≤ ${maxPrice.toLocaleString('vi-VN')}đ`, background: '#000', color: '#fff', icon: 'info', timer: 1400 });
  }
  window.handleSearch = async function() {
    const kw = document.getElementById('searchInput').value.trim().toLowerCase();
    if (!kw) return;
    const all = await apiGet('/products');
    const filtered = all.filter(p => p.productName.toLowerCase().includes(kw) || (p.brandName && p.brandName.toLowerCase().includes(kw)));
    renderProducts(filtered);
    document.getElementById('collection-title').innerHTML = `KẾT QUẢ: "${kw.toUpperCase()}"`;
  };
  window.onclick = (e) => { if(e.target == document.getElementById('quickViewModal')) closeModal(); }

  document.addEventListener('DOMContentLoaded', () => {
    loadBrands();
    selectAll(null);
    loadCartCount();
  });
</script>
</body>
</html>
