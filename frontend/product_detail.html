<!DOCTYPE html>
<html lang="vi">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chi tiết sản phẩm | Sportify Premium Store</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <style>
    :root {
      --white: #ffffff;
      --gray-bg: #f8f9fa;
      --gray-border: #e5e7eb;
      --black: #111111;
      --text-muted: #6b7280;
      --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.04);
      --shadow-premium: 0 20px 50px rgba(0, 0, 0, 0.04);
      --radius: 8px;
      --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      --success: #10b981;
      --danger: #ef4444;
      --star-color: #ffbe0b;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Plus Jakarta Sans', sans-serif;
    }

    body {
      background-color: var(--white);
      color: var(--black);
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
    }

    /* ===== HEADER ĐỒNG BỘ ===== */
    .topbar {
      position: sticky;
      top: 0;
      z-index: 1000;
      background: rgba(255, 255, 255, 0.95);
      border-bottom: 1px solid var(--gray-border);
      padding: 16px 0;
      backdrop-filter: blur(8px);
    }

    .topbar-inner {
      max-width: 1440px;
      margin: 0 auto;
      padding: 0 40px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .brand-wrapper {
      display: flex;
      align-items: center;
      text-decoration: none;
    }

    .brand-logo {
      width: 40px;
      height: 40px;
      background: var(--black);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .brand-logo i {
      color: var(--white);
      font-size: 18px;
    }

    .brand-title {
      font-size: 24px;
      font-weight: 900;
      font-style: italic;
      letter-spacing: -1px;
      color: var(--black);
      margin-left: 12px;
      text-transform: uppercase;
    }

    .cart-btn-wrapper {
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
      color: var(--black);
      font-weight: 700;
      font-size: 13px;
      background: var(--gray-bg);
      padding: 10px 20px;
      border-radius: 50px;
      border: 1px solid var(--gray-border);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      transition: var(--transition);
    }

    .cart-btn-wrapper:hover {
      background: var(--black);
      color: var(--white);
      border-color: var(--black);
    }

    .cart-icon-container {
      position: relative;
      display: flex;
      align-items: center;
    }

    .cart-icon-container i {
      font-size: 15px;
    }

    .cart-badge {
      position: absolute;
      top: -12px;
      right: -12px;
      background: var(--black);
      color: var(--white);
      font-size: 10px;
      font-weight: 800;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 2px solid var(--white);
    }

    .cart-btn-wrapper:hover .cart-badge {
      background: var(--white);
      color: var(--black);
    }

    /* ===== LAYOUT CHI TIẾT SẢN PHẨM ===== */
    .main-detail {
      max-width: 1440px;
      margin: 50px auto 30px;
      padding: 0 40px;
      display: grid;
      grid-template-columns: 1.2fr 1fr;
      gap: 80px;
    }

    .gallery-container {
      position: sticky;
      top: 120px;
      height: fit-content;
    }

    .main-img-view {
      background: var(--gray-bg);
      border-radius: var(--radius);
      overflow: hidden;
      aspect-ratio: 1/1;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 20px;
      border: 1px solid var(--gray-border);
    }

    .main-img-view img {
      width: 85%;
      height: auto;
      object-fit: contain;
      transition: transform 0.5s ease;
    }

    .thumbnail-grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 12px;
    }

    .thumb-item {
      aspect-ratio: 1/1;
      border-radius: 6px;
      background: var(--gray-bg);
      cursor: pointer;
      border: 1px solid var(--gray-border);
      overflow: hidden;
      padding: 4px;
      transition: var(--transition);
    }

    .thumb-item:hover,
    .thumb-item.active {
      border-color: var(--black);
    }

    .thumb-item.active {
      box-shadow: var(--shadow-sm);
    }

    .thumb-item img {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    .brand-label {
      font-weight: 800;
      text-transform: uppercase;
      color: var(--text-muted);
      font-size: 12px;
      letter-spacing: 2px;
      display: inline-block;
      margin-bottom: 5px;
    }

    .p-name {
      font-size: 36px;
      font-weight: 800;
      line-height: 1.2;
      margin: 5px 0 15px;
      color: var(--black);
      letter-spacing: -0.5px;
    }

    .p-price {
      font-size: 26px;
      font-weight: 800;
      margin-bottom: 35px;
      color: var(--black);
      border-bottom: 1px solid var(--gray-border);
      padding-bottom: 20px;
    }

    .variant-selector {
      margin-bottom: 28px;
    }

    .variant-title {
      font-size: 11px;
      font-weight: 800;
      text-transform: uppercase;
      margin-bottom: 12px;
      display: block;
      color: var(--black);
      letter-spacing: 0.5px;
    }

    .options-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .option-btn {
      padding: 12px 22px;
      border: 1px solid var(--gray-border);
      border-radius: 6px;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      transition: var(--transition);
      background: var(--white);
      color: var(--black);
      min-width: 65px;
      text-transform: uppercase;
    }

    .option-btn:hover:not(.disabled) {
      border-color: var(--black);
      background: var(--gray-bg);
    }

    .option-btn.selected {
      background: var(--black);
      color: var(--white);
      border-color: var(--black);
    }

    .stock-status {
      font-size: 13px;
      margin: 25px 0;
      font-weight: 700;
      display: flex;
      align-items: center;
      gap: 10px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #d1d5db;
    }

    .btn-add-cart {
      width: 100%;
      background: var(--black);
      color: var(--white);
      border: none;
      padding: 18px;
      font-weight: 700;
      font-size: 14px;
      border-radius: var(--radius);
      cursor: pointer;
      text-transform: uppercase;
      letter-spacing: 1px;
      transition: var(--transition);
    }

    .btn-add-cart:hover:not(:disabled) {
      background: #222222;
      transform: translateY(-1px);
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.08);
    }

    .btn-add-cart:disabled {
      background: var(--gray-border);
      color: #9ca3af;
      cursor: not-allowed;
    }

    .error-msg {
      color: var(--danger);
      font-size: 12px;
      font-weight: 700;
      margin-bottom: 15px;
      display: none;
      align-items: center;
      gap: 6px;
    }

    /* ===== KHU VỰC SẢN PHẨM LIÊN QUAN ===== */
    .related-section {
      max-width: 1440px;
      margin: 40px auto 10px;
      padding: 40px 40px 0;
      border-top: 1px solid var(--gray-border);
    }

    .related-header-wrapper {
      display: flex; 
      justify-content: space-between; 
      align-items: center; 
      margin-bottom: 25px;
    }

    .related-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 24px;
    }

    .related-card {
      border: 1px solid var(--gray-border);
      border-radius: var(--radius);
      padding: 16px;
      background: var(--white);
      text-decoration: none;
      color: var(--black);
      transition: var(--transition);
      display: flex;
      flex-direction: column;
    }

    .related-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 12px 30px rgba(0, 0, 0, 0.06);
      border-color: var(--black);
    }

    .related-img-wrapper {
      background: var(--gray-bg);
      border-radius: 6px;
      aspect-ratio: 1/1;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      margin-bottom: 12px;
    }

    .related-img-wrapper img {
      width: 85%;
      height: 85%;
      object-fit: contain;
      transition: var(--transition);
    }

    .related-card:hover .related-img-wrapper img {
      transform: scale(1.05);
    }

    .related-name {
      font-size: 14px;
      font-weight: 700;
      margin-bottom: 6px;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
      height: 44px;
      line-height: 1.5;
    }

    .related-price {
      font-size: 15px;
      font-weight: 800;
      color: var(--black);
      margin-top: auto;
    }

    /* ĐỊNH DẠNG HÀNG NÚT ĐIỀU KHIỂN PHÂN TRANG */
    .view-more-container {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 15px;
      margin-top: 35px;
    }

    .btn-view-more-related {
      background: transparent;
      color: var(--black);
      border: 1px solid var(--black);
      padding: 12px 30px;
      font-size: 13px;
      font-weight: 700;
      border-radius: 50px;
      cursor: pointer;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      transition: var(--transition);
    }

    .btn-view-more-related:hover:not(:disabled) {
      background: var(--black);
      color: var(--white);
    }

    .btn-collapse-related {
      background: transparent;
      color: var(--danger);
      border: 1px solid var(--danger);
      padding: 12px 30px;
      font-size: 13px;
      font-weight: 700;
      border-radius: 50px;
      cursor: pointer;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      transition: var(--transition);
    }

    .btn-collapse-related:hover {
      background: var(--danger);
      color: var(--white);
    }

    /* ===== KHU VỰC BÌNH LUẬN (COMMENT SECTION) ===== */
    .comment-section-container {
      max-width: 1440px;
      margin: 0 auto 100px;
      padding: 40px 40px 0;
      border-top: 1px solid var(--gray-border);
      display: grid;
      grid-template-columns: 1.2fr 1fr;
      gap: 80px;
    }

    .comment-header-title {
      font-size: 20px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: -0.5px;
      margin-bottom: 25px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .comment-form {
      background: var(--gray-bg);
      padding: 30px;
      border-radius: var(--radius);
      border: 1px solid var(--gray-border);
      height: fit-content;
    }

    .star-rating-picker {
      display: flex;
      gap: 8px;
      margin-bottom: 15px;
    }

    .star-rating-picker i {
      font-size: 20px;
      color: #ddd;
      cursor: pointer;
      transition: var(--transition);
    }

    .star-rating-picker i.active,
    .star-rating-picker i:hover {
      color: var(--star-color);
    }

    .comment-textarea-wrapper {
      margin-bottom: 20px;
    }

    .comment-textarea-wrapper textarea {
      width: 100%;
      height: 120px;
      padding: 15px;
      border: 1px solid var(--gray-border);
      border-radius: 6px;
      font-size: 14px;
      font-weight: 500;
      resize: none;
      outline: none;
      transition: var(--transition);
    }

    .comment-textarea-wrapper textarea:focus {
      border-color: var(--black);
    }

    .btn-submit-comment {
      background: var(--black);
      color: var(--white);
      border: none;
      padding: 12px 28px;
      font-weight: 700;
      font-size: 13px;
      border-radius: var(--radius);
      cursor: pointer;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      transition: var(--transition);
    }

    .btn-submit-comment:hover {
      background: #222;
    }

    .comment-display-list {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .comment-card-item {
      padding-bottom: 20px;
      border-bottom: 1px solid var(--gray-border);
    }

    .comment-card-item:last-child {
      border-bottom: none;
    }

    .comment-user-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
    }

    .comment-user-name {
      font-weight: 700;
      font-size: 15px;
    }

    .comment-stars-view i {
      font-size: 12px;
      margin-left: 1px;
    }

    .comment-stars-view i.fa-solid {
      color: var(--star-color);
    }

    .comment-stars-view i.fa-regular {
      color: #ddd;
    }

    .comment-text-content {
      color: #333333;
      font-size: 14px;
      font-weight: 500;
      word-wrap: break-word;
    }

    @media (max-width: 1024px) {
      .main-detail {
        grid-template-columns: 1fr;
        gap: 40px;
        padding: 0 20px;
        margin-bottom: 20px;
      }

      .related-section {
        padding: 20px 20px 0;
      }

      .related-grid {
        grid-template-columns: repeat(2, 1fr);
        gap: 16px;
      }

      .comment-section-container {
        grid-template-columns: 1fr;
        gap: 40px;
        padding: 20px 20px 0;
        margin-bottom: 60px;
      }

      .topbar-inner {
        padding: 0 20px;
      }

      .gallery-container {
        position: relative;
        top: 0;
      }

      .p-name {
        font-size: 30px;
      }
    }
  </style>
</head>

<body>

  <header class="topbar">
    <div class="topbar-inner">
      <a href="products.html" class="brand-wrapper">
        <div class="brand-logo">
          <i class="fa-solid fa-bolt-lightning"></i>
        </div>
        <div class="brand-title">SPORTIFY</div>
      </a>
      <a href="cart.html" class="cart-btn-wrapper">
        <div class="cart-icon-container">
          <i class="fa-solid fa-bag-shopping"></i>
          <span class="cart-badge" id="cart-count">0</span>
        </div>
        <span>Giỏ hàng</span>
      </a>
    </div>
  </header>

  <main class="main-detail" id="product-content">
    <div style="padding: 100px 0; text-align: center; grid-column: 1/-1; color: var(--text-muted); font-weight: 500;">
      <i class="fa-solid fa-spinner fa-spin" style="margin-right: 8px; font-size: 18px;"></i> Đang tải thông tin sản phẩm...
    </div>
  </main>

  <section class="related-section">
    <div class="related-header-wrapper">
      <h3 class="comment-header-title" style="margin-bottom: 0;"><i class="fa-solid fa-layer-group"></i> Sản phẩm liên quan</h3>
    </div>
    
    <div class="related-grid" id="related-list-target"></div>
    
    <div class="view-more-container">
      <button id="btn-load-more-related" class="btn-view-more-related" onclick="loadNextRelatedPage()" style="display: none;">
        Xem thêm <i class="fa-solid fa-chevron-down" style="margin-left: 5px; font-size: 11px;"></i>
      </button>
      <button id="btn-collapse-related" class="btn-collapse-related" onclick="collapseRelatedToDefault()" style="display: none;">
        Thu gọn <i class="fa-solid fa-chevron-up" style="margin-left: 5px; font-size: 11px;"></i>
      </button>
    </div>
  </section>

  <section class="comment-section-container">
    <div>
      <h3 class="comment-header-title"><i class="fa-regular fa-comments"></i> Đánh giá từ khách hàng</h3>
      <div class="comment-display-list" id="comment-list-target">
        <p style="color: var(--text-muted); font-style: italic; font-size: 14px;">Đang tải danh sách bình luận...</p>
      </div>
    </div>

    <div>
      <h3 class="comment-header-title"><i class="fa-regular fa-pen-to-square"></i> Viết đánh giá của bạn</h3>
      <div class="comment-form">
        <div class="variant-title">Xếp hạng của bạn</div>
        <div class="star-rating-picker" id="star-picker-container">
          <i class="fa-solid fa-star active" data-value="1" onclick="handleStarSelect(1)"></i>
          <i class="fa-solid fa-star active" data-value="2" onclick="handleStarSelect(2)"></i>
          <i class="fa-solid fa-star active" data-value="3" onclick="handleStarSelect(3)"></i>
          <i class="fa-solid fa-star active" data-value="4" onclick="handleStarSelect(4)"></i>
          <i class="fa-solid fa-star active" data-value="5" onclick="handleStarSelect(5)"></i>
        </div>

        <div class="variant-title" style="margin-top: 20px;">Nội dung đánh giá</div>
        <div class="comment-textarea-wrapper">
          <textarea id="comment-input-text"
            placeholder="Chia sẻ cảm nhận chi tiết của bạn về chất lượng sản phẩm, form dáng, dịch vụ vận chuyển..."></textarea>
        </div>
        <button class="btn-submit-comment" onclick="submitProductComment()">Gửi đánh giá</button>
      </div>
    </div>
  </section>

  <script src="api.js"></script>
  <script>
    const IMG_BASE = "/images/";
    let productData = null;
    let selectedColorId = null;
    let selectedSizeId = null;
    let globalCartCount = 0;
    let currentSelectedRating = 5;

    // Biến quản lý phân trang sản phẩm liên quan
    let currentRelatedPage = 0;
    const RELATED_PAGE_SIZE = 4;

    const urlParams = new URLSearchParams(window.location.search);
    const productId = urlParams.get('id');

    async function initPage() {
      const savedCount = localStorage.getItem('vinh_cart_count');
      if (savedCount) {
        globalCartCount = parseInt(savedCount);
        document.getElementById('cart-count').innerText = globalCartCount;
      }
      await loadCartCountFromBackend();
      if (productId) {
        await loadProduct();
        await loadCommentsUI();
        
        // Tạo hiệu ứng loading cho sản phẩm liên quan ban đầu
        document.getElementById('related-list-target').innerHTML = `
          <div id="related-loading-spinner" style="padding: 30px 0; text-align: center; color: var(--text-muted); grid-column: 1/-1;">
            <i class="fa-solid fa-spinner fa-spin" style="margin-right: 8px;"></i> Đang tải sản phẩm liên quan...
          </div>`;
        await fetchRelatedProducts();
      }
    }

    async function loadCartCountFromBackend() {
      try {
        const res = await apiGet('/cart');
        const count = (res.items || []).reduce((acc, item) => acc + item.quantity, 0);
        updateCartUI(count);
      } catch (err) {
        console.error("Chưa đăng nhập");
      }
    }

    async function loadProduct() {
      try {
        productData = await apiGet(`/products/${productId}`);
        renderProduct(productData);
      } catch (err) {
        document.getElementById('product-content').innerHTML = `
          <div style="text-align: center; padding: 80px 0; grid-column: 1/-1;">
            <i class="fa-solid fa-circle-exclamation" style="font-size: 48px; color: var(--danger); margin-bottom: 20px;"></i>
            <h2 style="font-size: 22px; font-weight: 800;">Sản phẩm không tồn tại hoặc đã ngừng kinh doanh</h2>
            <a href="products.html" class="btn-add-cart" style="display: inline-block; width: auto; margin-top: 20px; padding: 14px 30px; text-decoration: none;">Quay về trang chủ</a>
          </div>`;
      }
    }

    function renderProduct(p) {
      const images = p.images && p.images.length > 0 ? p.images : [];
      const mainImgSrc = images.length > 0 ? (images[0].startsWith('http') ? images[0] : IMG_BASE + images[0]) : 'https://via.placeholder.com/600';

      const colors = [...new Map(p.variants.map(v => [v.colorId, { id: v.colorId, name: v.colorName }])).values()];
      const sizes = [...new Map(p.variants.map(v => [v.sizeId, { id: v.sizeId, name: v.sizeName }])).values()];

      const container = document.getElementById('product-content');
      container.innerHTML = `
        <div class="gallery-container">
          <div class="main-img-view">
            <img src="${mainImgSrc}" id="mainImg">
          </div>
          <div class="thumbnail-grid">
            ${images.map((img, idx) => {
        const src = img.startsWith('http') ? img : IMG_BASE + img;
        return `
                <div class="thumb-item ${idx === 0 ? 'active' : ''}" onclick="switchImg(this, '${src}')">
                  <img src="${src}">
                </div>`;
      }).join('')}
          </div>
        </div>

        <div class="info-container">
          <span class="brand-label">${p.brandName}</span>
          <h1 class="p-name">${p.productName}</h1>
          <div class="p-price">${p.price.toLocaleString('vi-VN')}đ</div>
          
          <div class="variant-selector">
            <span class="variant-title">Màu sắc</span>
            <div class="options-grid" id="color-options">
              ${colors.map(c => `<button class="option-btn" onclick="selectColor(${c.id}, this)">${c.name}</button>`).join('')}
            </div>
          </div>

          <div class="variant-selector">
            <span class="variant-title">Kích thước</span>
            <div class="options-grid" id="size-options">
              ${sizes.map(s => `<button class="option-btn" onclick="selectSize(${s.id}, this)">${s.name}</button>`).join('')}
            </div>
          </div>

          <div id="variant-error" class="error-msg">
            <i class="fa-solid fa-circle-exclamation"></i> Vui lòng chọn đầy đủ Màu sắc và Kích thước trước khi mua.
          </div>

          <div class="stock-status" id="stock-info">
            <div class="dot"></div> Chọn biến thể để xem tình trạng hàng
          </div>

          <button class="btn-add-cart" id="add-btn" onclick="handleAddToCart()">Thêm vào giỏ hàng</button>
        </div>
      `;
    }

    function switchImg(el, src) {
      document.getElementById('mainImg').src = src;
      document.querySelectorAll('.thumb-item').forEach(i => i.classList.remove('active'));
      el.classList.add('active');
    }

    function selectColor(id, el) {
      selectedColorId = id;
      document.querySelectorAll('#color-options .option-btn').forEach(b => b.classList.remove('selected'));
      el.classList.add('selected');
      updateStockUI();
    }

    function selectSize(id, el) {
      selectedSizeId = id;
      document.querySelectorAll('#size-options .option-btn').forEach(b => b.classList.remove('selected'));
      el.classList.add('selected');
      updateStockUI();
    }

    function updateStockUI() {
      const errorMsg = document.getElementById('variant-error');
      const stockInfo = document.getElementById('stock-info');
      const addBtn = document.getElementById('add-btn');

      if (selectedColorId && selectedSizeId) {
        errorMsg.style.display = 'none';
        const v = productData.variants.find(v => v.colorId === selectedColorId && v.sizeId === selectedSizeId);

        if (v) {
          const isOutOfStock = v.stock <= 0;
          stockInfo.innerHTML = `
            <div class="dot" style="background: ${isOutOfStock ? 'var(--danger)' : 'var(--success)'}"></div> 
            ${isOutOfStock ? 'Hết hàng' : `Tình trạng: Còn lại ${v.stock} sản phẩm`}`;
          addBtn.disabled = isOutOfStock;
          addBtn.innerText = isOutOfStock ? "HẾT HÀNG" : "THÊM VÀO GIỎ HÀNG";
        } else {
          stockInfo.innerHTML = `<div class="dot" style="background: var(--danger)"></div> Không có sẵn mẫu phối này`;
          addBtn.disabled = true;
        }
      }
    }

    async function handleAddToCart() {
      if (!selectedColorId || !selectedSizeId) {
        document.getElementById('variant-error').style.display = 'flex';
        return;
      }

      const variant = productData.variants.find(v => v.colorId === selectedColorId && v.sizeId === selectedSizeId);

      if (!variant) {
        Swal.fire({ icon: 'error', title: 'Lỗi hệ thống', text: 'Biến thể mẫu này hiện không tồn tại!' });
        return;
      }

      try {
        await apiPost('/cart/add', { productColorSizeId: variant.id, quantity: 1 });
        Swal.fire({ icon: 'success', title: 'Đã thêm vào giỏ hàng!', text: 'Sản phẩm đã có trong bộ sưu tập của bạn.', showConfirmButton: false, timer: 1500 });
        await loadCartCountFromBackend();
      } catch (err) {
        console.error("Lỗi thêm vào giỏ:", err);
        Swal.fire({ icon: 'error', title: 'Yêu cầu đăng nhập', text: 'Vui lòng đăng nhập tài khoản để thực hiện chức năng thêm sản phẩm!' });
      }
    }

    function updateCartUI(count) {
      globalCartCount = count;
      document.getElementById('cart-count').innerText = count;
      localStorage.setItem('vinh_cart_count', count);
    }

    /* =========================================================
       ✨ LOGIC XỬ LÝ BÌNH LUẬN VÀ ĐÁNH GIÁ (COMMENTS JAVASCRIPT)
       ========================================================= */

    function handleStarSelect(score) {
      currentSelectedRating = score;
      const stars = document.querySelectorAll('#star-picker-container i');
      stars.forEach(star => {
        const starValue = parseInt(star.getAttribute('data-value'));
        if (starValue <= score) {
          star.classList.remove('fa-regular');
          star.classList.add('fa-solid', 'active');
        } else {
          star.classList.remove('fa-solid', 'active');
          star.classList.add('fa-regular');
        }
      });
    }

    async function loadCommentsUI() {
      const listTarget = document.getElementById('comment-list-target');
      try {
        const comments = await apiGet(`/comments/product/${productId}`);
        const currentUser = localStorage.getItem('fullName');

        if (!comments || comments.length === 0) {
          listTarget.innerHTML = `
        <div style="padding: 30px 0; text-align: center; color: var(--text-muted); font-size: 14px;">
          <i class="fa-regular fa-comment-dots" style="font-size: 24px; display:block; margin-bottom: 10px;"></i>
          Chưa có đánh giá nào cho sản phẩm này.
        </div>`;
          return;
        }

        listTarget.innerHTML = comments.map(c => {
          let starGroupHtml = '';
          for (let i = 1; i <= 5; i++) {
            starGroupHtml += i <= c.rating
              ? `<i class="fa-solid fa-star"></i>`
              : `<i class="fa-regular fa-star"></i>`;
          }

          const commentUser = (c.userName || c.username || '').trim().toLowerCase();
          const loggedUser = (currentUser || '').trim().toLowerCase();
          const isOwner = loggedUser !== '' && loggedUser === commentUser;

          let actionButtonsHtml = '';
          if (isOwner) {
            actionButtonsHtml = `
          <i class="fa-solid fa-pen-to-square" onclick="toggleEditRow(${c.id})" style="color: var(--text-muted); cursor: pointer; font-size: 13px; margin-left: 15px;" title="Sửa bình luận"></i>
          <i class="fa-solid fa-trash-can" onclick="removeComment(${c.id})" style="color: var(--danger); cursor: pointer; font-size: 13px; margin-left: 10px;" title="Xóa bình luận"></i>
        `;
          }

          return `
        <div class="comment-card-item" id="comment-block-${c.id}">
          <div class="comment-user-row">
            <div>
              <span class="comment-user-name">${c.userName || c.username || 'Khách hàng ẩn danh'}</span>
              ${actionButtonsHtml}
            </div>
            <div class="comment-stars-view">${starGroupHtml}</div>
          </div>
          
          <p class="comment-text-content" id="comment-text-${c.id}">${c.content}</p>
          
          <div id="edit-form-${c.id}" style="display: none; margin-top: 10px;">
            <div class="star-rating-picker" id="edit-star-picker-${c.id}" style="margin-bottom: 8px;">
              ${[1, 2, 3, 4, 5].map(star => `
                <i class="${star <= c.rating ? 'fa-solid' : 'fa-regular'} fa-star active" 
                   data-star="${star}" 
                   onclick="changeEditStar(${c.id}, ${star})"
                   style="font-size: 16px; color: ${star <= c.rating ? 'var(--star-color)' : '#ddd'}"></i>
              `).join('')}
            </div>
            <textarea id="edit-input-${c.id}" style="width:100%; height:70px; padding:10px; border:1px solid var(--gray-border); border-radius:6px; font-size:14px; resize:none; outline:none; font-weight:500; margin-bottom:8px;">${c.content}</textarea>
            <div style="display: flex; gap: 8px;">
              <button class="btn-submit-comment" onclick="saveUpdatedComment(${c.id})" style="padding: 6px 15px; font-size: 12px;">Lưu</button>
              <button class="btn-submit-comment" onclick="toggleEditRow(${c.id})" style="padding: 6px 15px; font-size: 12px; background: #6b7280;">Hủy</button>
            </div>
          </div>
        </div>
      `;
        }).join('');

      } catch (err) {
        console.error("Lỗi tải danh sách comment:", err);
      }
    }

    async function submitProductComment() {
      const inputEl = document.getElementById('comment-input-text');
      const content = inputEl.value.trim();

      if (!content) {
        Swal.fire({ icon: 'warning', title: 'Nội dung trống', text: 'Vui lòng nhập nội dung cảm nghĩ trước khi gửi đánh giá!' });
        return;
      }

      try {
        const bodyRequest = { content: content, rating: currentSelectedRating };
        await apiPost(`/comments?productId=${productId}`, bodyRequest);

        Swal.fire({ icon: 'success', title: 'Đánh giá thành công', text: 'Cảm ơn bạn đã đóng góp ý kiến phản hồi!', showConfirmButton: false, timer: 1500 });

        inputEl.value = '';
        handleStarSelect(5);
        await loadCommentsUI();

      } catch (err) {
        console.error("Lỗi đăng bình luận:", err);
        Swal.fire({ icon: 'error', title: 'Gửi đánh giá thất bại', text: 'Vui lòng đăng nhập tài khoản thành viên để thực hiện chức năng này!' });
      }
    }

    let activeEditRatings = {};

    function toggleEditRow(commentId) {
      const textEl = document.getElementById(`comment-text-${commentId}`);
      const formEl = document.getElementById(`edit-form-${commentId}`);

      if (formEl.style.display === 'none') {
        formEl.style.display = 'block';
        textEl.style.display = 'none';

        const activeStars = document.querySelectorAll(`#edit-star-picker-${commentId} i.fa-solid`);
        activeEditRatings[commentId] = activeStars.length;
      } else {
        formEl.style.display = 'none';
        textEl.style.display = 'block';
      }
    }

    function changeEditStar(commentId, score) {
      activeEditRatings[commentId] = score;
      const stars = document.querySelectorAll(`#edit-star-picker-${commentId} i`);
      stars.forEach(star => {
        const starValue = parseInt(star.getAttribute('data-star'));
        if (starValue <= score) {
          star.classList.remove('fa-regular');
          star.classList.add('fa-solid');
          star.style.color = 'var(--star-color)';
        } else {
          star.classList.remove('fa-solid');
          star.classList.add('fa-regular');
          star.style.color = '#ddd';
        }
      });
    }

    async function saveUpdatedComment(commentId) {
      const newContent = document.getElementById(`edit-input-${commentId}`).value.trim();
      const newRating = activeEditRatings[commentId] || 5;

      if (!newContent) {
        Swal.fire({ icon: 'warning', title: 'Nội dung trống', text: 'Nội dung bình luận không được để trống!' });
        return;
      }

      try {
        const bodyUpdate = { content: newContent, rating: newRating };
        await apiPut(`/comments/${commentId}`, bodyUpdate);

        Swal.fire({ icon: 'success', title: 'Đã cập nhật', text: 'Thay đổi đánh giá đã được lưu thành công!', showConfirmButton: false, timer: 1500 });
        await loadCommentsUI();

      } catch (err) {
        console.error("Lỗi cập nhật comment:", err);
        Swal.fire({ icon: 'error', title: 'Thất bại', text: 'Không thể chỉnh sửa bình luận này!' });
      }
    }

    async function removeComment(commentId) {
      const result = await Swal.fire({
        title: 'Xóa bình luận?',
        text: "Bạn có chắc chắn muốn gỡ bỏ đánh giá này không?",
        icon: 'warning',
        showCancelButton: true,
        confirmButtonColor: '#111111',
        cancelButtonColor: '#ef4444',
        confirmButtonText: 'ĐỒNG Ý',
        cancelButtonText: 'HỦY'
      });

      if (result.isConfirmed) {
        try {
          await apiDelete(`/comments/${commentId}`);
          Swal.fire({ icon: 'success', title: 'Đã xóa!', showConfirmButton: false, timer: 1500 });
          await loadCommentsUI();
        } catch (err) {
          console.error("Lỗi xóa comment:", err);
          Swal.fire({ icon: 'error', title: 'Thất bại', text: 'Không thể xóa bình luận này!' });
        }
      }
    }

    /* =======================================================================
       📦 CORE LOGIC: TẢI, NỐI TIẾP VÀ THU GỌN SẢN PHẨM LIÊN QUAN
       ======================================================================= */
    async function fetchRelatedProducts() {
      const target = document.getElementById('related-list-target');
      const viewMoreBtn = document.getElementById('btn-load-more-related');
      const collapseBtn = document.getElementById('btn-collapse-related');
      const spinner = document.getElementById('related-loading-spinner');
      
      try {
        const response = await apiGet(`/products/${productId}/related?page=${currentRelatedPage}&size=${RELATED_PAGE_SIZE}`);
        const relatedProducts = response.content || [];
        const isLastPage = response.last;

        if (spinner) spinner.remove();

        // 1. Trường hợp trang đầu tiên rỗng
        if (currentRelatedPage === 0 && relatedProducts.length === 0) {
          target.innerHTML = `
            <div style="padding: 20px 0; color: var(--text-muted); font-size: 14px; font-weight: 500; grid-column: 1/-1;">
              Không tìm thấy sản phẩm nào liên quan cùng thương hiệu.
            </div>`;
          viewMoreBtn.style.display = 'none';
          collapseBtn.style.display = 'none';
          return;
        }

        // Tạo HTML chuỗi sản phẩm
        const itemsHtml = relatedProducts.map(p => {
          const images = p.images && p.images.length > 0 ? p.images : [];
          const imgSrc = images.length > 0 
            ? (images[0].startsWith('http') ? images[0] : IMG_BASE + images[0]) 
            : 'https://via.placeholder.com/300';

          return `
            <a href="product_detail.html?id=${p.id}" class="related-card">
              <div class="related-img-wrapper">
                <img src="${imgSrc}" alt="${p.productName}">
              </div>
              <div class="related-name">${p.productName}</div>
              <div class="related-price">${p.price.toLocaleString('vi-VN')}đ</div>
            </a>
          `;
        }).join('');

        // 2. Chèn dữ liệu (Trang 0 thì ghi đè, Trang > 0 thì cộng dồn nối đuôi)
        if (currentRelatedPage === 0) {
          target.innerHTML = itemsHtml;
        } else {
          target.insertAdjacentHTML('beforeend', itemsHtml);
        }

        // 3. ĐIỀU KIỆN HIỂN THỊ NÚT XEM THÊM
        if (isLastPage || relatedProducts.length < RELATED_PAGE_SIZE) {
          viewMoreBtn.style.display = 'none';
        } else {
          viewMoreBtn.style.display = 'inline-block';
        }

        // 4. ĐIỀU KIỆN HIỂN THỊ NÚT THU GỌN
        // Xuất hiện nút Thu gọn từ trang thứ 2 trở đi (tức là khi currentRelatedPage >= 1)
        if (currentRelatedPage >= 1) {
          collapseBtn.style.display = 'inline-block';
        } else {
          collapseBtn.style.display = 'none';
        }

      } catch (err) {
        console.error("Lỗi tải sản phẩm liên quan:", err);
        if (spinner) spinner.remove();
        if (currentRelatedPage === 0) {
          target.innerHTML = `
            <div style="padding: 20px 0; color: var(--danger); font-size: 14px; font-weight: 600; grid-column: 1/-1;">
              <i class="fa-solid fa-triangle-exclamation"></i> Không thể tải danh sách sản phẩm liên quan lúc này.
            </div>`;
        }
      }
    }

    // Sự kiện khi bấm "Xem thêm"
    async function loadNextRelatedPage() {
      currentRelatedPage += 1;
      
      const viewMoreBtn = document.getElementById('btn-load-more-related');
      const originalText = viewMoreBtn.innerHTML;
      
      viewMoreBtn.disabled = true;
      viewMoreBtn.innerHTML = `<i class="fa-solid fa-spinner fa-spin"></i> Đang tải...`;
      
      await fetchRelatedProducts();
      
      viewMoreBtn.disabled = false;
      viewMoreBtn.innerHTML = originalText;
    }

    // ✨ Sự kiện khi bấm "Thu gọn" quay về trạng thái 4 sản phẩm ban đầu
    async function collapseRelatedToDefault() {
      currentRelatedPage = 0; // Đưa số trang quản lý về lại 0
      
      const target = document.getElementById('related-list-target');
      const collapseBtn = document.getElementById('btn-collapse-related');
      const viewMoreBtn = document.getElementById('btn-load-more-related');
      
      // Tạm ẩn các nút đi và xóa sạch lưới sản phẩm cũ để tải lại trang đầu
      collapseBtn.style.display = 'none';
      viewMoreBtn.style.display = 'none';
      target.innerHTML = `
        <div id="related-loading-spinner" style="padding: 30px 0; text-align: center; color: var(--text-muted); grid-column: 1/-1;">
          <i class="fa-solid fa-spinner fa-spin" style="margin-right: 8px;"></i> Đang thu gọn...
        </div>`;
      
      await fetchRelatedProducts();
      
      // Cuộn màn hình mượt mà về lại đầu khu vực sản phẩm liên quan để người dùng dễ theo dõi
      document.querySelector('.related-section').scrollIntoView({ behavior: 'smooth', block: 'start' });
    }

    document.addEventListener('DOMContentLoaded', initPage);
  </script>
</body>
